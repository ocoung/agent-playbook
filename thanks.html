<!DOCTYPE html>

<head>

<title>Thank You! — Agent Operator's Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

  p { color: rgba(255,255,255,0.8); font-size: 18px; line-height: 1.6; margin-bottom: 32px; }
  .download-btn {
    display: inline-block; background: linear-gradient(135deg, #818cf8, #c084fc); color: white;

  }
  .download-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(129, 140, 248, 0.6); }
